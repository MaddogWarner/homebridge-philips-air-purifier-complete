<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Philips Air Purifier Settings</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #161616;
      --panel: #242424;
      --panel-soft: #2d2d2d;
      --border: #3a3a3a;
      --text: #eeeeee;
      --muted: #aaaaaa;
      --accent: #e88122;
      --accent-dark: #c96d1f;
      --danger: #d64545;
      --success: #45a65a;
      --input: #111111;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      margin: 0;
      padding: 24px;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      font-size: 24px;
      font-weight: 650;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 18px;
      font-weight: 650;
      margin-bottom: 12px;
    }

    h3 {
      font-size: 15px;
      font-weight: 650;
      margin-bottom: 4px;
    }

    [hidden] {
      display: none !important;
    }

    .layout {
      display: grid;
      gap: 14px;
      max-width: 1040px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .airplus-step {
      display: none;
    }

    .airplus-step.active {
      display: block;
    }

    .device-grid {
      display: grid;
      gap: 10px;
    }

    .device-card {
      align-items: center;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(0, 1fr) auto;
      padding: 14px;
    }

    .device-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .empty {
      background: var(--panel-soft);
      border: 1px dashed #555555;
      border-radius: 8px;
      color: var(--muted);
      padding: 18px;
    }

    button {
      background: var(--accent);
      border: 0;
      border-radius: 6px;
      color: #ffffff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 650;
      min-height: 38px;
      padding: 9px 16px;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button.secondary {
      background: #3a3a3a;
      color: var(--text);
    }

    button.secondary:hover {
      background: #4a4a4a;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    textarea {
      background: var(--input);
      border: 1px solid #4a4a4a;
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      min-height: 40px;
      padding: 8px 10px;
      width: 100%;
    }

    textarea {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      min-height: 108px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      outline: none;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .status {
      border-radius: 6px;
      display: none;
      padding: 12px 14px;
    }

    .status.error {
      background: #2b1515;
      border: 1px solid var(--danger);
      color: #ffb7b7;
      display: block;
    }

    .status.success {
      background: #162718;
      border: 1px solid var(--success);
      color: #bdedc7;
      display: block;
    }

    .status.info {
      background: #1a2433;
      border: 1px solid #426da9;
      color: #c6ddff;
      display: block;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .device-card {
        grid-template-columns: 1fr;
      }

      .device-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <h1>Philips Air Purifier Settings</h1>
    </header>

    <div id="status" class="status"></div>

    <section class="panel">
      <h2>Air+ Cloud</h2>
      <div class="toolbar">
        <button id="airplus-start" type="button">Login with Air+ (cloud devices)</button>
      </div>

      <div id="airplus-flow" hidden>
        <div id="airplus-step-1" class="airplus-step">
          <p><a id="auth-link" href="#" target="_blank" rel="noopener">Open Philips login</a></p>
          <textarea id="redirect-url" placeholder="com.philips.air://loginredirect?code=..."></textarea>
          <div class="toolbar">
            <button id="airplus-continue" type="button">Continue</button>
            <button class="secondary" type="button" data-airplus-cancel>Cancel</button>
          </div>
        </div>

        <div id="airplus-step-2" class="airplus-step">
          <div id="airplus-device-list" class="device-grid">
            <div class="empty">Connecting...</div>
          </div>
          <div class="toolbar">
            <button class="secondary" type="button" data-airplus-cancel>Cancel</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const PLATFORM_ALIAS = 'PhilipsAirPurifier';
    const DEFAULT_PLATFORM_NAME = 'Philips Air Purifiers';

    let latestSchemaConfig = null;

    function req(path, body) {
      return homebridge.request(path, body || {}).catch((error) => {
        showStatus(error.message || String(error), 'error');
        throw error;
      });
    }

    function renderSchemaForm() {
      homebridge.showSchemaForm();
    }

    function normaliseConfigPayload(payload) {
      if (Array.isArray(payload)) {
        return payload[0] || {};
      }
      if (payload && Array.isArray(payload.config)) {
        return payload.config[0] || {};
      }
      if (payload && payload.config && typeof payload.config === 'object') {
        return payload.config;
      }
      return payload && typeof payload === 'object' ? payload : {};
    }

    async function getWorkingPlatformConfig() {
      const pluginConfigs = await homebridge.getPluginConfig();
      const persisted = pluginConfigs[0] || {};
      const formConfig = latestSchemaConfig || persisted;
      const devices = Array.isArray(formConfig.devices)
        ? formConfig.devices
        : Array.isArray(persisted.devices)
          ? persisted.devices
          : [];
      const config = {
        ...persisted,
        ...formConfig,
        platform: PLATFORM_ALIAS,
        name: formConfig.name || persisted.name || DEFAULT_PLATFORM_NAME,
        devices: devices.map((device) => ({ ...device })),
      };

      if (persisted.additionalDevicesJson && formConfig.additionalDevicesJson === undefined) {
        config.additionalDevicesJson = persisted.additionalDevicesJson;
      }

      return config;
    }

    async function startAirplusSetup() {
      hideStatus();
      setAirplusBusy(true);
      document.getElementById('airplus-flow').hidden = false;
      setAirplusStep(1);

      const authWindow = window.open('about:blank', '_blank');
      try {
        const result = await req('/auth/init');
        document.getElementById('auth-link').href = result.url;
        if (authWindow) {
          authWindow.location = result.url;
        }
      } catch (_error) {
        if (authWindow) authWindow.close();
        closeAirplusFlow(false);
      } finally {
        setAirplusBusy(false);
      }
    }

    async function exchangeAirplusCode() {
      const redirectUrl = document.getElementById('redirect-url').value.trim();
      if (!redirectUrl) {
        showStatus('Paste the Air+ redirect URL before continuing.', 'error');
        return;
      }

      setAirplusBusy(true);
      setAirplusStep(2);
      document.getElementById('airplus-device-list').innerHTML = '<div class="empty">Connecting...</div>';

      try {
        const result = await req('/auth/exchange', { redirectUrl });
        renderAirplusDevices(result.devices || []);
      } catch (_error) {
        setAirplusStep(1);
      } finally {
        setAirplusBusy(false);
      }
    }

    function renderAirplusDevices(devices) {
      const container = document.getElementById('airplus-device-list');
      if (!devices.length) {
        container.innerHTML = '<div class="empty">No Air+ devices found on this account.</div>';
        return;
      }

      container.innerHTML = devices
        .map((device, index) => {
          const uuid = escAttr(device.uuid || '');
          const name = escAttr(device.name || 'Philips Air Purifier');
          const model = escHtml(device.modelName || device.uuid || 'Air+ device');
          return '<div class="device-card">' +
            '<div>' +
              '<h3>' + escHtml(device.name || 'Philips Air Purifier') + '</h3>' +
              '<div class="meta">' + model + '</div>' +
              '<input id="airplus-name-' + index + '" type="text" value="' + name + '">' +
            '</div>' +
            '<div class="device-actions">' +
              '<button type="button" data-airplus-uuid="' + uuid + '" data-airplus-index="' + index + '">Add to Form</button>' +
            '</div>' +
          '</div>';
        })
        .join('');
    }

    async function saveAirplusDevice(uuid, index) {
      if (!uuid) {
        showStatus('Air+ device UUID is missing.', 'error');
        return;
      }

      const nameInput = document.getElementById('airplus-name-' + index);
      const name = nameInput && nameInput.value.trim() ? nameInput.value.trim() : 'Philips Air Purifier';

      setAirplusBusy(true);
      try {
        const result = await req('/auth/save', { uuid, name });
        await injectAirplusDevice({
          uuid: result.uuid || uuid,
          name: result.name || name,
          tokenFile: result.tokenFile,
        });
        closeAirplusFlow(false);
        showStatus('Air+ device added to the form. Review the new tab and click Save to persist it.', 'success');
      } finally {
        setAirplusBusy(false);
      }
    }

    async function injectAirplusDevice(device) {
      const config = await getWorkingPlatformConfig();
      const airplusDevice = {
        name: device.name || 'Philips Air Purifier',
        host: 'cloud',
        protocol: 'airplus-cloud',
        airplusDeviceUuid: device.uuid,
        airplusTokenFile: device.tokenFile,
      };

      const existingIndex = config.devices.findIndex((candidate) => candidate.airplusDeviceUuid === device.uuid);
      if (existingIndex >= 0) {
        config.devices[existingIndex] = {
          ...config.devices[existingIndex],
          ...airplusDevice,
        };
      } else {
        config.devices.push(airplusDevice);
      }

      latestSchemaConfig = config;
      await homebridge.updatePluginConfig([config]);
      renderSchemaForm();
    }

    function closeAirplusFlow(showMessage) {
      document.getElementById('airplus-flow').hidden = true;
      document.getElementById('redirect-url').value = '';
      document.getElementById('airplus-device-list').innerHTML = '<div class="empty">Connecting...</div>';
      if (showMessage) showStatus('Air+ setup cancelled.', 'info');
    }

    function setAirplusStep(step) {
      document.querySelectorAll('.airplus-step').forEach((element) => element.classList.remove('active'));
      document.getElementById('airplus-step-' + step).classList.add('active');
    }

    function setAirplusBusy(isBusy) {
      document.getElementById('airplus-start').disabled = isBusy;
      document.getElementById('airplus-continue').disabled = isBusy;
      document
        .querySelectorAll('[data-airplus-uuid]')
        .forEach((button) => {
          button.disabled = isBusy;
        });
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.className = 'status ' + (type || 'info');
      status.textContent = message;
    }

    function hideStatus() {
      const status = document.getElementById('status');
      status.className = 'status';
      status.textContent = '';
    }

    function escHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escAttr(value) {
      return escHtml(value);
    }

    window.homebridge.addEventListener('configChanged', (event) => {
      latestSchemaConfig = normaliseConfigPayload(event.data);
    });

    document.getElementById('airplus-start').addEventListener('click', startAirplusSetup);
    document.getElementById('airplus-continue').addEventListener('click', exchangeAirplusCode);
    document.querySelectorAll('[data-airplus-cancel]').forEach((button) => {
      button.addEventListener('click', () => closeAirplusFlow(true));
    });
    document.getElementById('airplus-device-list').addEventListener('click', (event) => {
      const button = event.target.closest('[data-airplus-uuid]');
      if (!button) return;
      saveAirplusDevice(button.dataset.airplusUuid, Number(button.dataset.airplusIndex));
    });

    renderSchemaForm();
  </script>
</body>
</html>
